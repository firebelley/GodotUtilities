on:
  push:
    tags:
      - "v*"
      - "!v**-sg"

jobs:
  export_game:
    runs-on: windows-latest
    environment: default
    name: Release
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout Files
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get Nuget Version
        run: echo ("VERSION=" + $env:GITHUB_REF_NAME.replace('v', '')) >> $env:GITHUB_ENV

      - name: Build Nupkg
        run: dotnet build -c Release

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: "**/*/*.nupkg"

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish Utilities to Nuget
        run: |
          cd .\GodotUtilities\bin\Release
          dotnet nuget push .\Firebelley.GodotUtilities.${{ env.VERSION }}.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
